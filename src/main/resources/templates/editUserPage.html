<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit a User</title>
</head>
<body>
<div th:insert="navbar.html"></div>
<br>
<h1>Edit the following user:</h1>
<hr>

<form method="post" action="updateUser">
  Id:<input type="text" th:value="${user.getId()}" name="id" readonly> <br><br>
  Username: <input type="text" th:value="${user.getUsername()}" name="username"> <br><br>
  <input type="hidden" th:value="${user.getPassword()}" name="password">
  <input type="submit" value="Update this User!!!!">


</form>

</body>
</html>
